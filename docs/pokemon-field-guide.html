document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the serving host's
    // frame-ancestors policy can allow an outer site to frame this
    // page, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

console ---------- */\n.hero{\n  position:relative; overflow:hidden; color:#fff;\n  background:linear-gradient(180deg,#4a4a66, var(--bezel) 55%, #30304a);\n  padding:48px 22px 118px;\n  box-shadow:inset 0 -10px 0 rgba(0,0,0,.35);\n}\n/* d-pad, bottom right */\n.hero::before{\n  content:\"\"; position:absolute; left:clamp(24px, 6vw, 90px); bottom:22px; width:72px; height:72px; opacity:.95; z-index:2;\n  background:\n    linear-gradient(#22223a,#22223a) 50% 0/26px 100% no-repeat,\n    linear-gradient(#22223a,#22223a) 0 50%/100% 26px no-repeat;\n  filter:drop-shadow(0 4px 0 rgba(0,0,0,.4));\n}\n/* A / B buttons */\n.hero::after{\n  content:\"\"; position:absolute; right:clamp(24px, 6vw, 90px); bottom:34px; width:118px; height:62px; pointer-events:none; z-index:2;\n  background:\n    radial-gradient(circle at 26% 68%, var(--btn) 0 19px, rgba(0,0,0,.35) 19px 21px, transparent 22px),\n    radial-gradient(circle at 76% 32%, var(--btn) 0 19px, rgba(0,0,0,.35) 19px 21px, transparent 22px);\n}\n.hero-inner{max-width:var(--wrap); margin:0 auto; display:flex; align-items:center; gap:34px; flex-wrap:wrap; position:relative; z-index:1}\n.dex-lens{\n  flex:0 0 auto; width:104px; height:104px; border-radius:50%;\n  background:radial-gradient(circle at 34% 30%, #dff3ff 0%, var(--lens) 30%, #2f8fe0 70%, #1664b6 100%);\n  border:6px solid #fff; box-shadow:0 0 0 5px rgba(0,0,0,.3), 0 6px 0 rgba(0,0,0,.35);\n  position:relative;\n}\n.dex-lens::before{\n  content:\"\"; position:absolute; top:14px; left:18px; width:30px; height:18px; border-radius:50%;\n  background:rgba(255,255,255,.85); transform:rotate(-20deg);\n  animation:glint 5.5s ease-in-out infinite;\n}\n.dex-leds{display:flex; gap:9px; margin-top:14px}\n.dex-leds i{width:12px; height:12px; border-radius:50%; box-shadow:inset 0 -2px 2px rgba(0,0,0,.3)}\n.dex-leds i:nth-child(1){background:#ff3b30; animation:blink 1.8s infinite}\n.dex-leds i:nth-child(2){background:#ffd60a}\n.dex-leds i:nth-child(3){background:#34c759}\n/* the gre -width:64ch; margin:18px 0 6px}\n\n/* ---------- big part banners: cartridge title screens ---------- */\n.guide-banner{\n  position:relative; margin:46px 0 8px; padding:26px 26px 26px 30px; border-radius:0;\n  color:#fff; border:5px solid var(--ink); box-shadow:var(--hard-lg); overflow:hidden;\n  scroll-margin-top:76px; isolation:isolate;\n}\n.guide-banner.program{background:var(--gold); color:#241a00}\n.guide-banner.trainer{background:var(--red)}\n.guide-banner.dex{background:var(--gb-darkest); color:var(--gb-lightest)}\n.guide-banner.dex p{color:var(--gb-lightest); opacity:.9}\n.guide-banner .kicker{font-family:var(--pix); font-size:7.5px; letter-spacing:.18em; text-transform:uppercase; opacity:.85; line-height:1.8}\n.guide-banner h2{margin:10px 0 10px; font-family:var(--pix); font-size:clamp(15px,2.6vw,24px); font-weight:400; letter-spacing:.01em; line-height:1.5; text-transform:uppercase; text-shadow:2px 2px 0 rgba(0,0,0,.18)}\n.guide-banner p{margin:0; font-size:16px; max-width:58ch; opacity:.95}\n.guide-banner .ball-watermark{position:absolute; right:-30px; top:-30px; opacity:.14}\n.guide-banner .ball-watermark svg{animation:ballspin 46s linear infinite}\n/* screen scanlines on the dark dex banner */\n.guide-banner.dex::after{\n  content:\"\"; position:absolute; inset:0; pointer-events:none;\n  background:repeating-linear-gradient(0deg, rgba(155,188,15,.07) 0 1px, transparent 1px 3px);\n}\n\n/* ---------- section headings ---------- */\n.sec{padding:30px 0 6px; scroll-margin-top:76px}\n.sec > h3{\n  display:flex; align-items:center; gap:14px;\n  font-family:var(--pix); font-size:clamp(12px,1.8vw,16px); font-weight:400; color:var(--ink);\n  margin:0 0 10px; letter-spacing:.02em; line-height:1.6; text-transform:uppercase;\n}\n.sec > h3 .n{\n  font-family:var(--pix); font-size:11px; color:var(--ink);\n  width:34px; height:34px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;\n  flex:0 0 auto; will-change:transform;\n  background:\n    radial-gradient(circle at 50% 50%, #fff 0 9px, #16181d 9px 11px, transparent 11px),\n    linear-gradient(to bottom, var(--red) 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%);\n  box-shadow:2px 2px 0 rgba(22,24,29,.3), inset 0 -2px 3px rgba(0,0,0,.12);\n}\n.programmode .sec > h3 .n{background:\n    radial-gradient(circle at 50% 50%, #fff 0 9px, #16181d 9px 11px, transparent 11px),\n    linear-gradient(to bottom, var(--gold) 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%)}\n.dexmode .sec > h3 .n{background:\n    radial-gradient(circle at 50% 50%, #fff 0 9px, #16181d 9px 11px, transparent 11px),\n    linear-gradient(to bottom, var(--blue) 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%)}\n.sec > h3.inview .n{animation:pokethrow .62s cubic-bezier(.2,.7,.2,1) both}\n.sec p{margin:.7em 0}\n.sec ol,.sec ul{margin:.7em 0; padding-left:0}\n.sec ol{list-style:none; counter-reset:step}\n.sec ol > li{\n  position:relative; counter-increment:step; padding:12px 14px 12px 58px; margin:12px 0;\n  background:var(--card); border:3px solid var(--ink); border-radius:0; box-shadow:var(--hard-sm);\n}\n.sec ol > li::before{\n  content:counter(step); position:absolute; left:12px; top:11px;\n  width:32px; height:32px; border-radius:50%; color:var(--ink);\n  font-family:var(--pix); font-weight:400; font-size:10px;\n  display:flex; align-items:center; justify-content:center;\n  background:\n    radial-gradient(circle at 50% 50%, #fff 0 9px, #16181d 9px 11px, transparent 11px),\n    linear-gradient(to bottom, var(--red) 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%);\n  box-shadow:2px 2px 0 rgba(22,24,29,.25), inset 0 -2px 0 rgba(0,0,0,.18);\n}\n.programmode .sec ol > li::before{background:\n    radial-gradient(circle at 50% 50%, #fff 0 9px, #16181d 9px 11px, transparent 11px),\n    linear-gradient(to bottom, var(--gold) 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%)}\n.dexmode .sec ol > li::before{background:\n    radial-gradient(circle at 50% 50%, #fff 0 9px, #16181d 9px 11px, transparent 11px),\n    linear-gradient(to bottom, var(--blue) 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%)}\n.sec ul{list-style:none}\n.sec ul > li{position:relative; padding:4px 0 4px 26px; margin:3px 0}\n.sec ul > li::before{\n  content:\"\"; position:absolute; left:0; top:.62em; width:14px; height:14px; border-radius:50%;\n  background:linear-gradient(to bottom,var(--red) 0 46%, #222 46% 54%, #fff 54% 100%);\n  box-shadow:2px 2px 0 rgba(22,24,29,.2);\n}\n\n/* ---------- the game loop strip ---------- */\n.loop{display:flex; align-items:stretch; gap:0; margin:20px 0; flex-wrap:wrap}\n.loop .stop{\n  flex:1 1 120px; background:var(--card); border:3px solid var(--ink); border-radius:0; box-shadow:var(--hard-sm);\n  padding:14px 12px 12px; text-align:center; position:relative; margin:6px;\n  transition:transform .16s ease, box-shadow .16s ease;\n}\n.loop .stop:hover{transform:translate(-2px,-2px); box-shadow:8px 8px 0 rgba(22,24,29,.22)}\n.loop .stop b{display:block; font-size:14.5px; line-height:1.25}\n.loop .stop span{font-family:var(--pix); font-size:6.5px; color:var(--muted); letter-spacing:.06em; line-height:1.8; display:block; margin-top:4px; text-transform:uppercase}\n.loop .stop::after{\n  content:\"▶\"; position:absolute; right:-16px; top:50%; transform:translateY(-50%);\n  color:var(--gold-deep); font-weight:900; font-size:15px; z-index:1;\n}\n.loop .stop:last-child::after{content:\"↻\"}\n\n/* ---------- screenshot frames: little handhelds ---------- */\nfigure.shot{margin:18px 0}\nfigure.shot .frame{\n  background:var(--bezel); padding:16px 16px 26px; border-radius:10px 10px 34px 10px;\n  border:3px solid #22223a; box-shadow:var(--hard); position:relative;\n}\nfigure.shot .frame::before{\n  content:\"\"; position:absolute; top:7px; left:50%; transform:translateX(-50%);\n  width:70px; height:4px;\n  background:repeating-linear-gradient(90deg,#5a5a78 0 4px, transparent 4px 8px);\n}\nfigure.shot .frame::after{\n  content:\"POWER\"; position:absolute; left:18px; bottom:7px; padding-left:11px;\n  font-family:var(--pix); font-size:6px; color:#9a96b8; letter-spacing:.14em;\n  background:radial-gradient(circle at 3px 55%, #ff3b30 0 3px, transparent 4px);\n  animation:blink 1.8s infinite;\n}\nfigure.shot img{border:4px solid var(--gb-darkest); border-radius:0; width:100%; margin-top:6px; background:var(--gb-lightest)}\nfigure.shot figcaption{\n  font-family:var(--pix); font-size:7.5px; color:#cfd6e6; text-align:center; margin-top:12px; letter-spacing:.06em; line-height:1.9; text-transform:uppercase;\n}\n\n/* ---------- callouts: dialog boxes ---------- */\n.callout{margin:18px 0; border:3px solid var(--ink); border-radius:0; box-shadow:var(--hard-sm); overflow:hidden}\n.callout .tag{\n  font-family:var(--pix); font-size:8px; font-weight:400; letter-spacing:.14em; text-transform:uppercase;\n  padding:10px 14px; color:#fff; display:flex; align-items:center; gap:9px; line-height:1.4;\n}\n.callout .body{padding:13px 16px; font-size:16px}\n.callout.oak{\n  background:#fff; margin:26px 4px; overflow:visible; border:none;\n  box-shadow:0 0 0 3px #fff, 0 0 0 6px var(--blue), 0 0 0 9px #182069, 8px 8px 0 rgba(22,24,29,.3);\n}\n.callout.oak .tag{background:var(--blue)}\n.callout.oak .tag svg{display:none}\n.callout.oak .tag::before{\n  content:\"\"; width:26px; height:26px; flex:0 0 auto;\n  background:#fff var(--oak-sprite) center/cover; image-rendering:pixelated;\n  box-shadow:0 0 0 2px rgba(255,255,255,.85);\n}\n.callout.oak .body{position:relative; padding:14px 36px 16px 16px; font-size:15.5px; line-height:1.75}\n.callout.oak .body::after{\n  content:\"▼\"; position:absolute; right:13px; bottom:9px; font-size:12px; color:var(--blue);\n  animation:vblink 1.1s steps(2, start) infinite;\n}\n.callout.tip{background:#fff8e6}\n.callout.tip .tag{background:var(--gold); color:#241a00}\n.callout.note{background:#f1f5ff}\n.callout.note .tag{background:var(--blue-bright)}\n.callout.soon{background:#fdf2f2}\n.callout.soon .tag{background:var(--red-deep)}\n.callout.pokedex{background:var(--gb-darkest); color:var(--gb-lightest); position:relative}\n.callout.pokedex .tag{background:var(--gb-dark); color:#eafff5}\n.callout.pokedex .body{font-family:var(--mono); font-size:14.5px; line-height:1.55; position:relative}\n.callout.pokedex::after{\n  content:\"\"; position:absolute; inset:0; pointer-events:none;\n  background:repeating-linear-gradient(0deg, rgba(155,188,15,.08) 0 1px, transparent 1px 3px);\n}\n\n/* ---------- tables ---------- */\n.tablewrap{overflow-x:auto; margin:18px 0; border:3px solid var(--ink); border-radius:0; box-shadow:var(--hard-sm); background:var(--card)}\ntable{border-collapse:collapse; width:100%; min-width:440px; font-size:15.5px}\ncaption{caption-side:top; text-align:left; font-family:var(--pix); font-weight:400; padding:14px 14px 6px; font-size:9px; letter-spacing:.08em; text-transform:uppercase}\nth,td{padding:11px 14px; text-align:left}\nthead th{\n  background:var(--gb-darkest); color:var(--gb-lightest); font-family:var(--pix); font-size:8px; font-weight:400;\n  letter-spacing:.1em; text-transform:uppercase; line-height:1.7;\n}\ntbody tr:nth-child(even){background:#f4f2e2}\ntbody td{border-bottom:2px dashed var(--line)}\ntbody tr:last-child td{border-bottom:none}\ntbody td:first-child{font-weight:700}\ntd code,th code{background:var(--gb-darkest)}\n\n/* ---------- formula block: DMG screen ---------- */\n.formula{\n  margin:18px 0; padding:22px 20px; border-radius:0; text-align:center; position:relative;\n  background:var(--gb-darkest); color:var(--gb-lightest); font-family:var(--mono); font-size:clamp(14px,2.6vw,19px);\n  border:4px solid var(--gb-dark); box-shadow:var(--hard); letter-spacing:.01em; overflow-x:auto;\n  text-shadow:0 0 9px rgba(155,188,15,.55);\n}\n.formula::after{\n  content:\"\"; position:absolute; inset:0; pointer-events:none;\n  background:repeating-linear-gradient(0deg, rgba(155,188,15,.08) 0 2px, transparent 2px 5px);\n}\n\n/* ---------- sprite grid: green-screen until hover ---------- */\n.spritegrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr)); gap:14px; margin:20px 0}\n.sprite{\n  background:var(--card); border:3px solid var(--ink); border-radius:0; padding:12px 8px 11px; text-align:center;\n  box-shadow:var(--hard-sm); transition:transform .16s ease, box-shadow .16s ease; cursor:var(--ball-cursor);\n}\n.sprite:hover{transform:translate(-3px,-5px); box-shadow:9px 10px 0 rgba(22,24,29,.24)}\n.sprite .pad{\n  background:var(--gb-lightest); border:2px solid var(--gb-darkest);\n  border-radius:0; padding:6px; margin-bottom:8px; position:relative; overflow:hidden;\n}\n.sprite .pad::before{\n  content:\"\"; position:absolute; inset:0; pointer-events:none; z-index:1;\n  background:repeating-linear-gradient(0deg, rgba(15,56,15,.10) 0 1px, transparent 1px 3px);\n}\n.sprite img{image-rendering:pixelated; width:72px; height:72px; margin:0 auto; image-rendering:-moz-crisp-edges;\n  filter:sepia(.95) hue-rotate(52deg) saturate(2.4) brightness(.92); transition:filter .18s ease}\n.sprite:hover img{filter:none; animation:pixelhop .45s ease}\n.sprite .dex{font-family:var(--pix); font-size:6.5px; color:var(--muted); letter-spacing:.1em}\n.sprite .nm{font-weight:800; font-size:13.5px; line-height:1.15; margin:3px 0 2px}\n.sprite .cap{font-size:11.5px; color:var(--ink-soft); line-height:1.25}\n\n/* ---------- poke divider: dashed route line ---------- */\n.divider{display:flex; align-items:center; gap:14px; margin:40px 0 6px}\n.divider .line{flex:1; height:4px;\n  background:repeating-linear-gradient(90deg, rgba(22,24,29,.35) 0 10px, transparent 10px 20px)}\n.divider svg{animation:ballspin 9s linear infinite}\n.pokeball{display:inline-block; vertical-align:middle}\n\n/* ---------- footer: console bottom ---------- */\n.foot{margin-top:0; background:var(--bezel); color:#b8b4c8; padding:30px 22px 40px; border-top:5px solid #22223a}\n.foot .wrap{display:flex; gap:18px; align-items:center; flex-wrap:wrap; justify-content:space-between}\n.foot b{color:#fff}\n.foot .mono{font-family:var(--pix); font-size:7px; letter-spacing:.1em; line-height:2; text-transform:uppercase}\n.foot svg{overflow:visible}\n.foot svg path, .foot svg circle, .foot svg rect{transition:transform .28s cubic-bezier(.34,1.56,.64,1), filter .28s ease}\n.foot svg:hover path:nth-of-type(1){transform:translateY(-7px)}\n.foot svg:hover path:nth-of-type(2){transform:translateY(7px)}\n.foot svg:hover rect{transform:scaleY(1.4); transform-box:fill-box; transform-origin:center}\n.foot svg:hover circle:nth-of-type(2){filter:drop-shadow(0 0 5px #fff) drop-shadow(0 0 9px #8fd0ff)}\n\n/* ---------- type badges: pixel chips, canon colors ---------- */\n.tps{display:inline-flex; gap:5px; margin-left:7px; vertical-align:1px; flex-wrap:wrap}\n.tp{\n  display:inline-block; font-family:var(--pix); font-weight:400; font-size:6.5px; line-height:1;\n  letter-spacing:.08em; text-transform:uppercase; color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,.5);\n  padding:5px 8px 4px; border-radius:0; border:2px solid rgba(0,0,0,.55);\n  box-shadow:2px 2px 0 rgba(0,0,0,.25); cursor:var(--ball-cursor);\n  transition:transform .08s ease, filter .12s ease;\n}\n.tp:hover{transform:translate(-1px,-1px); filter:brightness(1.12) saturate(1.15)}\n.tp:active{transform:translate(1px,1px) scale(.97); filter:brightness(.92)}\n.tp-normal{background:#A8A77A}.tp-fire{background:#EE8130}.tp-water{background:#6390F0}\n.tp-electric{background:#F7D02C}.tp-grass{background:#7AC74C}.tp-ice{background:#96D9D6}\n.tp-fighting{background:#C22E28}.tp-poison{background:#A33EA1}.tp-ground{background:#E2BF65}\n.tp-flying{background:#A98FF3}.tp-psychic{background:#F95587}.tp-bug{background:#A6B91A}\n.tp-rock{background:#B6A136}.tp-ghost{background:#735797}.tp-dragon{background:#6F35FC}\n.tp-dark{background:#705746}.tp-steel{background:#B7B7CE}.tp-fairy{background:#D685AD}\n\n/* ---------- toc ---------- */\n.toc{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin:26px 0 8px}\n.toc-col{background:var(--card); border:3px solid var(--ink); border-radius:0; padding:18px 20px; box-shadow:var(--hard-sm);\n  transition:transform .18s ease, box-shadow .18s ease}\n.toc-col:hover{transform:translate(-2px,-3px); box-shadow:8px 9px 0 rgba(22,24,29,.2)}\n.toc-col h4{margin:0 0 12px; font-family:var(--pix); font-weight:400; font-size:9px; line-height:1.8; display:flex; align-items:center; gap:9px; flex-wrap:wrap; text-transform:uppercase; letter-spacing:.06em}\n.toc-sub{font-family:var(--pix); font-size:6px; font-weight:400; color:var(--muted); letter-spacing:.08em}\n.toc-list{margin:0; padding:0; list-style:none}\n.toc-list li{margin:5px 0; padding:0}\n.toc-list li a{color:var(--ink-soft); font-weight:600; font-size:14.5px; cursor:var(--ball-cursor)}\n.toc-list li a:hover{color:var(--red); background:var(--gb-lightest); box-shadow:0 0 0 3px var(--gb-lightest); text-decoration:none}\n.goldcol .toc-list li a:hover{color:var(--gold-deep)}\n.dexcol .toc-list li a:hover{color:var(--blue)}\n@media (max-width:760px){.toc{grid-template-columns:1fr}}\n\n/* ---------- reveal animation ---------- */\n.sec,.guide-banner,figure.shot,.callout,.tablewrap,.spritegrid,.formula,.loop{\n  animation:rise .6s cubic-bezier(.2,.7,.2,1) both;\n}\n@supports (animation-timeline: view()){\n  figure.shot,.callout,.tablewrap,.spritegrid,.formula,.loop{\n    animation:rise linear both; animation-timeline:view(); animation-range:entry 0% entry 60%;\n  }\n}\n/* EXP bar fills as you read */\n@supports (animation-timeline: scroll()){\n  .nav{overflow:visible}\n  .nav::after{\n    content:\"\"; position:absolute; left:0; right:0; bottom:0; height:4px;\n    background:linear-gradient(90deg, var(--gold-deep), var(--gold) 60%, #fff3b8);\n    transform-origin:0 50%; transform:scaleX(0);\n    animation:expfill linear both; animation-timeline:scroll(root);\n  }\n  @keyframes expfill{to{transform:scaleX(1)}}\n}\n/* HP-bar drain underlines on the three nav tabs */\n.nav a.tab{position:relative}\n.nav a.tab::after{\n  content:\"\"; position:absolute; left:10px; right:10px; bottom:3px; height:3px;\n  background:#3ecf4a; transform-origin:left center; transform:scaleX(1);\n  transition:transform .5s cubic-bezier(.4,0,.2,1), filter .45s ease;\n}\n.nav a.tab:hover::after,\n.nav a.tab:focus-visible::after{\n  transform:scaleX(.18);\n  filter:hue-rotate(-120deg) saturate(1.6) brightness(1.05);\n}\n/* wild-flash on Part One/Two banners */\n.guide-banner::before{\n  content:\"\"; position:absolute; inset:0; pointer-events:none;\n  z-index:3; background:#fff; opacity:0;\n}\n.guide-banner:not(.dex).inview::before{animation:wildflash .55s steps(1,end) both}\n.wild-label{\n  position:absolute; top:12px; right:20px; z-index:4;\n  font-family:var(--pix); font-size:7px; letter-spacing:.16em; text-transform:uppercase;\n  color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,.5); opacity:0;\n}\n.guide-banner:not(.dex).inview .wild-label{animation:wildlabel 2.4s ease both}\n/* radial-iris battle transition on the Part-Three banner */\n.guide-banner.dex{clip-path:circle(140% at 50% 50%); animation:none}\n.guide-banner.dex.inview{animation:iris .72s cubic-bezier(.7,0,.3,1) both}\n/* CRT power-on for the formula screens */\n.formula.inview{\n  animation:crton .85s cubic-bezier(.2,.7,.2,1) both;\n  animation-timeline:auto; transform-origin:center;\n}\n/* Master Ball tier for the deepest engineering headings */\n.dexmode #reward-engine > h3 .n,\n.dexmode #silence-guarantee > h3 .n,\n.dexmode #encrypted-grass > h3 .n,\n.dexmode #capture-formula > h3 .n{\n  position:relative;\n  background:\n    radial-gradient(circle at 50% 50%, #fff 0 8px, #16181d 8px 10px, transparent 10px),\n    radial-gradient(circle at 33% 25%, #ff73c8 0 2.6px, transparent 3px),\n    radial-gradient(circle at 67% 25%, #ff73c8 0 2.6px, transparent 3px),\n    linear-gradient(to bottom, #6a4fb3 0 42%, #16181d 42% 58%, #f1f3f7 58% 100%);\n}\n.dexmode #reward-engine > h3 .n::after,\n.dexmode #silence-guarantee > h3 .n::after,\n.dexmode #encrypted-grass > h3 .n::after,\n.dexmode #capture-formula > h3 .n::after{\n  content:\"\"; position:absolute; inset:-5px; border-radius:50%; z-index:-1; pointer-events:none;\n  background:radial-gradient(circle, rgba(168,110,255,.6), transparent 70%);\n  animation:masterpulse 2.6s ease-in-out infinite;\n}\n/* gym badge strip */\n.badgestrip{display:flex; gap:14px; justify-content:center; flex-wrap:wrap;\n  max-width:var(--wrap); margin:38px auto 0; padding:0 22px}\n.badgestrip i{\n  width:34px; height:34px; display:block; transform-origin:center;\n  background:\n    radial-gradient(circle at 34% 28%, rgba(255,255,255,.9), transparent 44%),\n    radial-gradient(circle at 50% 60%, var(--c), color-mix(in srgb, var(--c) 55%, #000));\n  box-shadow:inset 0 -2px 3px rgba(0,0,0,.4), inset 0 2px 2px rgba(255,255,255,.45), 2px 3px 0 rgba(0,0,0,.28);\n  transition:transform .18s ease, filter .18s ease; cursor:var(--ball-cursor);\n}\n.badgestrip i:nth-child(1){clip-path:polygon(30% 0,70% 0,100% 30%,100% 70%,70% 100%,30% 100%,0 70%,0 30%)}\n.badgestrip i:nth-child(2){clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}\n.badgestrip i:nth-child(3){clip-path:polygon(48% 0,82% 0,58% 40%,86% 40%,28% 100%,44% 52%,18% 52%)}\n.badgestrip i:nth-child(4){clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%); background:conic-gradient(from 0deg,#ff5964,#ffbf3f,#4caf6e,#3ba7e0,#8e6fd6,#ff5964)}\n.badgestrip i:nth-child(5){clip-path:polygon(50% 100%,0 38%,15% 10%,50% 28%,85% 10%,100% 38%)}\n.badgestrip i:nth-child(6){border-radius:50%}\n.badgestrip i:nth-child(7){clip-path:polygon(50% 0,100% 38%,82% 100%,18% 100%,0 38%)}\n.badgestrip i:nth-child(8){clip-path:polygon(50% 0,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%)}\n.badgestrip i:hover{transform:translateY(-4px) rotate(-6deg) scale(1.12); filter:brightness(1.15) saturate(1.1)}\n.badgestrip.inview i{animation:badgestamp .5s cubic-bezier(.3,1.5,.5,1) backwards; animation-delay:calc(var(--i,0) * .07s)}\n@media (max-width:430px){\n  .badgestrip{display:grid; grid-template-columns:repeat(4, 34px); justify-content:center}\n}\n/* pixel tall grass above the footer, DMG greens */\n.grass-edge{\n  height:34px; margin:46px 0 -1px;\n  background:\n    conic-gradient(from 160deg at 50% 0, var(--gb-light) 40deg, transparent 0) 8px 100%/16px 60% repeat-x,\n    conic-gradient(from 160deg at 50% 0, var(--gb-dark) 40deg, transparent 0) 0 100%/16px 100% repeat-x;\n  animation:grasssway 4.5s ease-in-out infinite alternate;\n}\n/* the word SHINY, actually shiny */\n.shiny-word{\n  background:linear-gradient(90deg, #b98a00, #ffe98a 32%, #fff 46%, #ffe98a 60%, #b98a00);\n  background-size:220% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;\n  font-weight:900; animation:goldsheen 2.6s linear infinite;\n}\n\n/* ---------- keyframes ---------- */\n@keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}\n@keyframes glint{0%,100%{opacity:.85; transform:rotate(-20deg) translateX(0)}50%{opacity:.35; transform:rotate(-20deg) translateX(8px)}}\n@keyframes blink{0%,60%,100%{opacity:1}30%{opacity:.25}}\n@keyframes scanmove{from{background-position:0 0}to{background-position:0 6px}}\n@keyframes ballspin{to{transform:rotate(360deg)}}\n@keyframes goldsheen{to{background-position:-220% 0}}\n@keyframes vblink{50%{opacity:0}}\n@keyframes pixelhop{30%{transform:translateY(-7px)}60%{transform:translateY(2px)}}\n@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}60%{transform:rotate(12deg)}}\n@keyframes grasssway{from{background-position:8px 100%, 0 100%}to{background-position:5px 100%, 2px 100%}}\n@keyframes pokethrow{\n  0%  {opacity:0; transform:translate(-120px,40px) rotate(-720deg) scale(.4)}\n  35% {opacity:1; transform:translate(-40px,-38px) rotate(-300deg) scale(.9)}\n  60% {transform:translate(0,0) rotate(0) scale(1.06)}\n  72% {transform:translateY(5px) scaleY(.82) scaleX(1.14)}\n  86% {transform:translateY(-3px) scale(1)}\n  100%{transform:none}\n}\n@keyframes wildflash{\n  0%  {opacity:0; background:#fff}\n  10% {opacity:.92}            18%{opacity:0}\n  28% {opacity:.78; background:#0a0c12}\n  36% {opacity:0}\n  46% {opacity:.6; background:#fff}       54%{opacity:0}\n  64% {opacity:.34}           72%{opacity:0}\n  100%{opacity:0}\n}\n@keyframes wildlabel{0%,12%{opacity:0} 22%{opacity:1} 78%{opacity:1} 100%{opacity:0}}\n@keyframes badgestamp{\n  0%  {opacity:0; transform:scale(2.4) rotate(20deg)}\n  60% {opacity:1; transform:scale(.86) rotate(-4deg)}\n  100%{opacity:1; transform:none}\n}\n@keyframes crton{\n  0%  {opacity:.2; transform:scaleY(.006) scaleX(.86); filter:brightness(3) saturate(0)}\n  9%  {opacity:1;  transform:scaleY(.006) scaleX(1);   filter:brightness(3)}\n  24% {transform:scaleY(1) scaleX(1); filter:brightness(1.9)}\n  28% {filter:brightness(.55)} 33%{filter:brightness(1.7)} 40%{filter:brightness(1)}\n  100%{transform:none; filter:none; opacity:1}\n}\n@keyframes masterpulse{0%,100%{opacity:.22; transform:scale(.9)} 50%{opacity:.9; transform:scale(1.2)}}\n@keyframes iris{from{clip-path:circle(0% at 50% 50%)} to{clip-path:circle(140% at 50% 50%)}}\n\n/* ================= FULL-WIDTH TWO-COLUMN LAYOUT (unchanged) ================= */\n.sec > p,\n.sec > ol,\n.sec > ul,\n.sec > .body,\n.sec > .formula,\n.sec > .callout        { max-width:74ch }\n.sec > figure.shot,\n.sec > .tablewrap,\n.sec > .spritegrid,\n.sec > .loop           { max-width:none }\n@media (min-width:1140px){\n  .sec{\n    display:grid;\n    grid-template-columns:minmax(0,74ch) minmax(0,340px);\n    justify-content:space-between;\n    column-gap:clamp(32px,3.4vw,60px);\n    align-items:start;\n    grid-auto-flow:row dense;\n  }\n  .sec > *{ grid-column:1; min-width:0 }\n  .sec > h3{ grid-column:1 / -1 }\n  .sec > figure.shot,\n  .sec > .tablewrap,\n  .sec > .spritegrid,\n  .sec > .loop{ grid-column:1 / -1 }\n  .sec > .callout.tip,\n  .sec > .callout.note{\n    grid-column:2;\n    align-self:start;\n    margin:2px 0 16px;\n  }\n  .sec > .callout.tip .tag,\n  .sec > .callout.note .tag  { font-size:7px }\n  .sec > .callout.tip .body,\n  .sec > .callout.note .body { font-size:14.5px; padding:12px 15px }\n}\n\n/* ---------- reduced motion ---------- */\n@media (prefers-reduced-motion:reduce){\n  *{animation:none !important; scroll-behavior:auto}\n  .nav a.tab::after, .tp, .foot svg path, .foot svg circle, .foot svg rect, .badgestrip i, .sprite img{transition:none !important}\n  .nav a.tab:hover::after, .nav a.tab:focus-visible::after{transform:scaleX(1) !important; filter:none !important}\n  .foot svg:hover path, .foot svg:hover rect{transform:none !important}\n  .guide-banner.dex{clip-path:none !important}\n}\n\n/* ---------- print ---------- */\n@media print{\n  body{background:#fff; font-size:12.5px}\n  .nav{position:static; box-shadow:none}\n  .sec,.guide-banner,figure.shot,.callout,.tablewrap,.spritegrid,.formula,.loop,\n  .sec > h3 .n, .sec > h3 .n::after, .guide-banner.dex, .badgestrip i{animation:none !important}\n  .sec ol > li, figure.shot, .callout, .tablewrap, .sprite{break-inside:avoid}\n  .guide-banner{break-inside:avoid; break-before:page}\n  .hero{padding:30px 22px}\n  .hero::before,.hero::after,.guide-banner::before,.formula::after,.callout.pokedex::after,\n  .bolt-edge,.grass-edge,.wild-label,.badgestrip{display:none !important}\n  .nav a.tab::after{display:none !important}\n  .callout.oak{box-shadow:none; outline:2px solid var(--blue)}\n  .guide-banner.dex{clip-path:none !important}\n  .foot svg path{transform:none !important}\n  .sprite img{filter:none}\n  .sec{display:block}\n  .sec > *, .sec > h3, .sec > .callout.tip, .sec > .callout.note{grid-column:auto}\n}\n\n/* ---------- responsive ---------- */\n@media (max-width:640px){\n  body{font-size:16.5px}\n  .hero{padding:34px 18px 48px}\n  .hero::before,.hero::after{display:none}\n  .dex-lens{width:80px; height:80px}\n  .hero-inner > div:last-child{padding:20px 18px 18px}\n  .sec ol > li{padding-left:54px}\n  .wrap,.nav-inner,.hero-inner{padding-left:16px; padding-right:16px}\n  .loop .stop::after{content:\"\"}\n  .callout.oak{margin:24px 6px}\n}\n<\/style>\n<\/head>\n<body>\n\n<header class=\"hero\">\n  <div class=\"hero-inner\">\n    <div>\n      <div class=\"dex-lens\"><\/div>\n      <div class=\"dex-leds\"><i><\/i><i><\/i><i><\/i><\/div>\n    <\/div>\n    <div>\n      <h1>POKÉ<span class=\"y\">MON<\/span><br>FIELD GUIDE<\/h1>\n      <p class=\"sub\">What this is, how to play it, and exactly how it works under the hood, straight from Professor Oak's lab.<\/p>\n      <span class=\"badge\">Pilot build · Gen 1–4 · #001–493 · 6 biomes<\/span>\n    <\/div>\n  <\/div>\n<\/header>\n<div class=\"bolt-edge\" aria-hidden=\"true\"><\/div>\n\n<nav class=\"nav\">\n  <div class=\"nav-inner\">\n    <svg class=\"pokeball\" width=\"22\" height=\"22\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg>\n    <a href=\"#top-intro\" style=\"font-weight:800\">Field Guide<\/a>\n    <button class=\"nav-burger\" type=\"button\" aria-label=\"Guide sections\" aria-expanded=\"false\" aria-controls=\"nav-links\"><i><\/i><i><\/i><i><\/i><\/button>\n    <div class=\"nav-links\" id=\"nav-links\">\n      <a class=\"tab gold\" href=\"#program-guide\">1 · The Program<\/a>\n      <a class=\"tab red\" href=\"#trainer-guide\">2 · Trainer's Guide<\/a>\n      <a class=\"tab dark\" href=\"#dex-guide\">3 · Under the Hood<\/a>\n    <\/div>\n  <\/div>\n<\/nav>\n\n<main>\n  <div class=\"wrap\">\n    <p class=\"lede\" id=\"top-intro\">Welcome, Trainer! The full field guide to the <strong>Pokémon Gamification<\/strong> app, in three parts: <strong>The Program<\/strong> (what this is, and why your real work earns PokéDollars), <strong>The Trainer's Guide<\/strong> (how to play), and <strong>Under the Hood<\/strong> (the exact math).<\/p>\n\n<div class=\"toc\">\n  <div class=\"toc-col goldcol\">\n    <h4><svg class=\"pokeball\" width=\"20\" height=\"20\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> The Program <span class=\"toc-sub\">what &amp; why<\/span><\/h4>\n    <ul class=\"toc-list\">\n      <li><a href=\"#what-is-this\">Work. Catch. Level Up.<\/a><\/li>\n      <li><a href=\"#what-work-pays\">What Your Work Pays<\/a><\/li>\n      <li><a href=\"#ground-rules\">The Ground Rules<\/a><\/li>\n      <li><a href=\"#road-ahead\">The Road Ahead<\/a><\/li>\n    <\/ul>\n  <\/div>\n  <div class=\"toc-col\">\n    <h4><svg class=\"pokeball\" width=\"20\" height=\"20\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> Trainer's Guide <span class=\"toc-sub\">play it in 12 steps<\/span><\/h4>\n    <ul class=\"toc-list\">\n      <li><a href=\"#open-the-app\">1. Open the App<\/a><\/li>\n      <li><a href=\"#meet-professor-oak\">2. Meet Professor Oak<\/a><\/li>\n      <li><a href=\"#trainer-card\">3. Read Your Trainer Card<\/a><\/li>\n      <li><a href=\"#earn-while-working\">4. Earn While You Work<\/a><\/li>\n      <li><a href=\"#explore-biomes\">5. Explore the Six Biomes<\/a><\/li>\n      <li><a href=\"#wild-encounter\">6. A Wild Pokemon Appears!<\/a><\/li>\n      <li><a href=\"#catching\">7. Catching (Break Free &amp; Flee)<\/a><\/li>\n      <li><a href=\"#poke-mart\">8. Stock Up at the Poke Mart<\/a><\/li>\n      <li><a href=\"#give-exp\">9. Spend XP to Level Up<\/a><\/li>\n      <li><a href=\"#evolve\">10. Evolve (Levels &amp; Stones)<\/a><\/li>\n      <li><a href=\"#nickname\">11. Nicknames<\/a><\/li>\n      <li><a href=\"#release\">12. Release a Pokemon<\/a><\/li>\n    <\/ul>\n  <\/div>\n  <div class=\"toc-col dexcol\">\n    <h4><svg class=\"pokeball\" width=\"20\" height=\"20\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> Under the Hood <span class=\"toc-sub\">for the engineers<\/span><\/h4>\n    <ul class=\"toc-list\">\n      <li><a href=\"#architecture\">The Plumbing at a Glance<\/a><\/li>\n      <li><a href=\"#reward-engine\">The Reward Engine<\/a><\/li>\n      <li><a href=\"#silence-guarantee\">The Silence Guarantee<\/a><\/li>\n      <li><a href=\"#encrypted-grass\">The Grass Is Encrypted<\/a><\/li>\n      <li><a href=\"#capture-formula\">The Capture Formula<\/a><\/li>\n      <li><a href=\"#shiny\">Shinies &amp; Critical Captures<\/a><\/li>\n      <li><a href=\"#growth-curves\">The Six Growth Curves<\/a><\/li>\n      <li><a href=\"#biomes\">The Six Biomes &amp; Rarity Tiers<\/a><\/li>\n      <li><a href=\"#levels-floors\">Levels, Floors &amp; the Lv-46 Gate<\/a><\/li>\n      <li><a href=\"#economy\">Economy Invariants<\/a><\/li>\n    <\/ul>\n  <\/div>\n<\/div>\n\n    <!-- ================= PART ONE : THE PROGRAM ================= -->\n    <article class=\"programmode\">\n    <div class=\"guide-banner program\" id=\"program-guide\">\n      <div class=\"ball-watermark\"><svg class=\"pokeball\" width=\"150\" height=\"150\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg><\/div>\n      <div class=\"kicker\">Part One · The Program · For Everyone<\/div>\n      <span class=\"wild-label\" aria-hidden=\"true\">A wild guide appeared!<\/span>\n      <h2>Work. Catch. Level Up.<\/h2>\n      <p>Why there is suddenly a Pokedex in your Salesforce, and what your real work has to do with it.<\/p>\n    <\/div>\n\n    <section class=\"sec\" id=\"what-is-this\"><h3><span class=\"n\">1<\/span>What Is This?<\/h3>\n    <p><strong>Pokémon Gamification<\/strong> layers a game on the work you already do. Create a Trainer, catch wild Pokemon across six biomes, then level, evolve, and fill a Pokedex of the first 493 species: the complete Generation 1–4 canon.<\/p>\n    <p>What makes it more than a toy: <strong>finishing real work pays your Trainer<\/strong>. Close a case and PokéDollars (₽) and XP land on your Trainer Card. The ₽ buys balls and stones at the Poke Mart; the XP levels your Pokemon. Do your job, build your collection.<\/p>\n    <div class=\"loop\">\n      <div class=\"stop\"><b>Do real work<\/b><span>cases · tickets · time<\/span><\/div>\n      <div class=\"stop\"><b>Earn ₽ + XP<\/b><span>paid automatically<\/span><\/div>\n      <div class=\"stop\"><b>Buy balls<\/b><span>at the Poke Mart<\/span><\/div>\n      <div class=\"stop\"><b>Catch Pokemon<\/b><span>six biomes of grass<\/span><\/div>\n      <div class=\"stop\"><b>Level &amp; evolve<\/b><span>spend your XP<\/span><\/div>\n    <\/div>\n    <div class=\"callout oak\"><div class=\"tag\"><svg class=\"pokeball\" width=\"15\" height=\"15\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> Professor Oak<\/div><div class=\"body\">Hello there! Every journey starts with one closed case. Do good work. The tall grass takes care of the rest.<\/div><\/div>\n    <\/section>\n\n    <section class=\"sec\" id=\"what-work-pays\"><h3><span class=\"n\">2<\/span>What Your Work Pays<\/h3>\n    <div class=\"body\">\n    <p>The reward engine watches the records you already touch and pays the <strong>record owner<\/strong> the moment something finishes. Launch rates:<\/p>\n    <div class=\"tablewrap\"><table>\n      <thead><tr><th>You do this<\/th><th>You earn<\/th><\/tr><\/thead>\n      <tbody>\n        <tr><td>Close a Case<\/td><td>₽12 + 60 XP<\/td><\/tr>\n        <tr><td>Close a Service Request<\/td><td>₽15 + 75 XP<\/td><\/tr>\n        <tr><td>Move a Ticket through Refinement<\/td><td>₽5 + 25 XP<\/td><\/tr>\n        <tr><td>Move a Ticket through Planning<\/td><td>₽5 + 25 XP<\/td><\/tr>\n        <tr><td>Deliver a Ticket<\/td><td>₽15 + 75 XP<\/td><\/tr>\n        <tr><td>Log Time Worked<\/td><td>₽10 + 42 XP <em>per hour<\/em> (counts up to 12 h per entry)<\/td><\/tr>\n      <\/tbody>\n    <\/table><\/div>\n    <ul>\n      <li><strong>A full ticket journey pays ₽25 + 125 XP<\/strong> (Refinement, then Planning, then Delivery), weighted toward shipping.<\/li>\n      <li><strong>Finishing pays once.<\/strong> Re-saving a closed record pays nothing; only the <em>transition<\/em> into done pays.<\/li>\n      <li><strong>Some things never pay:<\/strong> junk/comms cases and PTO time entries are excluded.<\/li>\n      <li><strong>Daily cap: ₽4,000 per day<\/strong>, so the game never becomes a grind target. <strong>XP has no cap<\/strong>; big days bank big XP.<\/li>\n    <\/ul>\n    <\/div>\n    <div class=\"callout note\"><div class=\"tag\">Heads Up<\/div><div class=\"body\">These rates are launch-day config, living in admin-editable rules and tunable during the pilot. The mechanics stay the same.<\/div><\/div>\n    <\/section>\n\n    <section class=\"sec\" id=\"ground-rules\"><h3><span class=\"n\">3<\/span>The Ground Rules<\/h3>\n    <ul>\n      <li><strong>It's opt-in.<\/strong> No Trainer, no game. You join by meeting Professor Oak once (Part Two, step 2).<\/li>\n      <li><strong>It can never touch your work.<\/strong> It never edits records, never blocks a save; if it fails, your record saves as if the game didn't exist. (Engineers: see <a href=\"#silence-guarantee\">the Silence Guarantee<\/a>.)<\/li>\n      <li><strong>Rewards go to the record owner.<\/strong> If a teammate updates a record you own, the payout is still yours.<\/li>\n      <li><strong>One Trainer per person<\/strong>, and admins hold a master switch that can pause the whole economy at any time.<\/li>\n      <li><strong>Everything is server-checked.<\/strong> Prices, catch odds, levels, shinies: all decided in Apex. Clever browser tricks earn nothing.<\/li>\n    <\/ul>\n    <\/section>\n\n    <section class=\"sec\" id=\"road-ahead\"><h3><span class=\"n\">4<\/span>The Road Ahead<\/h3>\n    <p>Two headline features show in the app today but aren't <strong>reachable yet<\/strong>. They're the endgame, unlocked when the work-rewards program switches on. Catch the commons now:<\/p>\n    <ul>\n      <li><strong>Master Balls<\/strong> are retired: the old dex-milestone grant is switched off, so they can't be bought <em>or<\/em> earned. The bag slot remains, forever at zero.<\/li>\n      <li><strong>Legendary Pokemon<\/strong> (Mewtwo, Lugia, Ho-Oh, Dialga, Giratina, Darkrai and friends) hide in the three late-game biomes, surfacing only once your strongest Pokemon reaches <strong>level 46+<\/strong>, which takes real work income.<\/li>\n      <li><strong>Trading<\/strong> shows a button on every Pokemon card, disabled for now (\"Coming in Phase 2\").<\/li>\n    <\/ul>\n    <\/section>\n    <\/article>\n\n    <div class=\"divider\"><span class=\"line\"><\/span><svg class=\"pokeball\" width=\"30\" height=\"30\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg><span class=\"line\"><\/span><\/div>\n\n    <!-- ================= PART TWO : TRAINER'S GUIDE ================= -->\n    <article class=\"trainermode\">\n    <div class=\"guide-banner trainer\" id=\"trainer-guide\">\n      <div class=\"ball-watermark\"><svg class=\"pokeball\" width=\"150\" height=\"150\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg><\/div>\n      <div class=\"kicker\">Part Two · How To Play · Stupid-Easy Edition<\/div>\n      <span class=\"wild-label\" aria-hidden=\"true\">A wild guide appeared!<\/span>\n      <h2>Your Trainer's Guide: Catch 'Em All<\/h2>\n      <p>A friendly, step-by-step walkthrough for becoming a Pokemon Trainer. No experience needed, pictures included.<\/p>\n    <\/div>\n\n    <section class=\"sec\" id=\"open-the-app\"><h3><span class=\"n\">1<\/span>Open the App<\/h3>\n    <ol>\n      <li>In the top-left corner, click the grid of dots (the App Launcher).<\/li>\n      <li>In the search box, type <strong>Pokemon<\/strong>.<\/li>\n      <li>Click <strong>Pokemon Home<\/strong> when it appears.<\/li>\n    <\/ol>\n    <p>Up top you'll see three tabs: <strong>Trainer Hub<\/strong>, <strong>Biomes<\/strong>, and <strong>Poke Mart<\/strong>.<\/p>\n    <div class=\"callout tip\"><div class=\"tag\">Trainer Tip<\/div><div class=\"body\">Don't see the Pokemon Home app? It's not turned on for your account yet; ask your admin to assign the Pokemon access permission.<\/div><\/div>\n    <\/section>\n\n    <section class=\"sec\" id=\"meet-professor-oak\"><h3><span class=\"n\">2<\/span>Meet Professor Oak (Your First Time Only)<\/h3>\n    <p>The first time you open the app, Professor Oak greets you in a pop-up, <strong>Professor Oak's Lab<\/strong>, with four quick screens. Click the blue button to advance.<\/p>\n    <ol>\n      <li><strong>Welcome:<\/strong> Oak says hello. Click <strong>Let's Go<\/strong>.<\/li>\n      <li><strong>Your name:<\/strong> the name other trainers see, prefilled. Keep or change it, then click <strong>Next<\/strong>.<\/li>\n      <li><strong>Pick a rival (optional):<\/strong> a friendly competitor from the dropdown, or leave it on <strong>No rival<\/strong>. It doesn't change how you play, and you can change it anytime from the Trainer Hub — click the pencil next to <strong>Rival<\/strong> on your Trainer Card and pick a new one (or N\/A). Click <strong>Next<\/strong>.<\/li>\n      <li><strong>Choose your starter:<\/strong> pick <strong>one<\/strong> of the 17 on offer as your first partner, then click <strong>Begin Adventure<\/strong>.<\/li>\n    <\/ol>\n    <p>And you're a Trainer: your first Pokemon, <strong>₽500<\/strong>, and <strong>5 Poké Balls<\/strong> in your bag. One Trainer per person, and you can't rival yourself.<\/p>\n    <figure class=\"shot\"><div class=\"frame\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAApQAAAGiCAIAAADWZsFGAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAClKADAAQAAAABAAABogAAAABZXn6HAABAAElEQVR4Aey9B2Bc13UmjMGgE70TJEgA7J2SSElUlyXFki3Ziovc4pa26c6mOP/+u9k4ZZON8+d37E2c/H/WTmLHsmM5jiVZlmRJlmSJoihSrGIROwmSIAGSIHqdmf3OOe/eufOmYACiDXQeBu+de+855577vfK9e18LfPSjH82ajCkSdRJx5KysmERUKSoFouJskEw4tDTybIhLY1AEFAFFQBHIeAQisQyZrD2BwBj8k5PMclz5DkFzXJGxKTvq3zGOZs6QBLQijFiAWhCg/xmKRKtVBBQBRUARmDMIpOBsFMVTtejH51tAJoe8jTtibjmrsIw8Lh43fmZgGWCadhlbaXsGVoNWqQgoAorAOwABH5fbpI+tE/K6wDMJ5G142utzwy9ROPe9WZjt60FIGgFDAIVTcyLM5NzxRlJZfLavQo1PEVAEFIFZjIDlZonRl3QDT8HWrhrkMchbutE+G6I4fxZzNdN2mPveYcPfniJRYtwU7yVOZRoz6ApDthk1l3h18Hwa8deqFAFFQBGY+whY5jb0atnR63WLgu2CJ6PzxORNzqxDAtNNEKNRmincFNASoTBnZ4W4XHriRoG8+KdUZX7dKU6Duam7HSL+JpkSCC/RacoUR6LuFQFFQBFQBOYOAg5be5wn5BjXQk9RaNvlbFe2VgnIm9xHaTWulkD0ji7S4t4zBOjRPCsC5maZDEnBi8fWGCdI/5tUo1PsfXa2hx6rFFVPKnH00dIkbqHAY+bE2IFwIAL+5lF0W2/Ug0qKgCKgCCgCikCaCFgCdASYulzmp0DSZAKHYPvf8dUlIG9xS1zM/pmJPcMomxGFcwo6ZglRIoIldcE5WMg+Bo0JArZi42sOK5l+r9 y\">\n    <p><strong>You don't have to do anything for this step.<\/strong> Once the rewards program is on, just do your normal job exactly like today. When something you own finishes, ₽ and XP land on your Trainer Card automatically.<\/p>\n    <p>Full rates are back in <a href=\"#what-work-pays\">Part One<\/a>. The money side caps at <strong>₽4,000 a day<\/strong>; XP never caps.<\/p>\n    <\/div>\n    <div class=\"callout note\"><div class=\"tag\">Heads Up<\/div><div class=\"body\">Until the program switches on for your org, your ₽ is the ₽500 welcome gift (an admin can top you up). You'll know the engine's live when your card moves on its own.<\/div><\/div>\n    <\/section>\n\n    <section class=\"sec\" id=\"explore-biomes\"><h3><span class=\"n\">5<\/span>Explore the Six Biomes<\/h3>\n    <div class=\"body\">\n    <p>To find wild Pokemon, head to the <strong>Biomes<\/strong> tab. Each biome is an area with its own cast of Pokemon:<\/p>\n    <ol>\n      <li><strong>Verdant Meadow:<\/strong> sunny fields, the classic starting route. <span class=\"tps\"><i class=\"tp tp-grass\">grass<\/i><i class=\"tp tp-bug\">bug<\/i><i class=\"tp tp-normal\">normal<\/i><i class=\"tp tp-flying\">flying<\/i><\/span><\/li>\n      <li><strong>Rocky Cavern:<\/strong> deep caves and tunnels. <span class=\"tps\"><i class=\"tp tp-rock\">rock<\/i><i class=\"tp tp-ground\">ground<\/i><i class=\"tp tp-steel\">steel<\/i><i class=\"tp tp-fighting\">fighting<\/i><\/span><\/li>\n      <li><strong>Azure Shore:<\/strong> beaches, surf, and shorebirds. <span class=\"tps\"><i class=\"tp tp-water\">water<\/i><i class=\"tp tp-ice\">ice<\/i><i class=\"tp tp-flying\">flying<\/i><\/span><\/li>\n      <li><strong>Scorched Summit:<\/strong> a volcano of fire and dragons. <span class=\"tps\"><i class=\"tp tp-fire\">fire<\/i><i class=\"tp tp-fighting\">fighting<\/i><i class=\"tp tp-dragon\">dragon<\/i><\/span><\/li>\n      <li><strong>Mystic Mirage:<\/strong> a strange, shimmering place. <span class=\"tps\"><i class=\"tp tp-psychic\">psychic<\/i><i class=\"tp tp-fairy\">fairy<\/i><\/span><\/li>\n      <li><strong>Spectral Graveyard:<\/strong> where the spirits drift. <span class=\"tps\"><i class=\"tp tp-ghost\">ghost<\/i><i class=\"tp tp-dark\">dark<\/i><\/span><\/li>\n    <\/ol>\n    <p>Click a biome and four patches of <strong>tall grass<\/strong> appear, each hiding one wild Pokemon. Click a patch to wade in.<\/p>\n    <\/div>\n    <figure class=\"shot\"><div class=\"frame\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABegAAAMlCAIAAACHAoSaAAAQAElEQVR4nOzdB3wURRvH8UkjvZJAQu+9F5EmXRARFEFAigqCqAhiQUAUUCygiPCCIB0UqdIEFAWpUqT3FmqAhCSkV9Le527hPNPIJZdw4O/7ieve3rY7ktnd/87M2qalpSkAAAAAAABYHmsFAAAAAAAAi0RwAwAAAAAAYKEIbgAAAAAAACwUwQ0AAAAAAICFIrgBAAAAAACwUAQ3AAAAAAAAFspWWaSwlKSQlIQUxaPKzczZyraEnaONslIAAAAAACBXQkJCAgICQkND4+Li5KWTk5O3t3fJkiV9fHyUuVmlpVlcOHLyTtS5O9EK+cPeyrqRg5ePjb0CAAAAAAA5FhgYuHv37oMHD8bHx5cuXVpiGmdnZ5keGxsrUc7Vq1cdHR0bNGjQtGnTYsWKKTOxuODmUlLskcQIhfwk2c1Tzr7UuwEAAAAAICeioqKWL19++PDhFi1aNGrUqGzZspnOdvny5f379+/YsaNevXo9evRwc3NTeWZxwc2vsUFxaSkK+ayBvWdpOycFAAAAAACydejQoenTp3fq1KlLly62tvfvcyY5OXndunUbNmwYOHBgkyZNVN5YXHDzc8wNhfxXtZBrtUJmSP4AAAAAAHiE/fzzz0ePHu3fv39WtWyycvny5fnz59epU+f5559XeUBw8x9FcAMAAAAAQPbWrFlz6dKlYcOG5aSiTUbJyclTp04tXrx4z549VW7xOHAAAAAAAID0fv3113Pnzr377ru5S22ELCiLX7lyRValcovgBgAAAAAA4F+uXr0qacvgwYNVnslKZFXnz59XuUJwAwAAAAAA8C9z5szp3bu3h4eHyjNZiaxq8eLFKlcIbgAAAAAAAP6xbds2T0/PRo0aKTORVckKZbXKdLlspvXAnT54/vTBCzLSbfDThvF0L2VcAQAAAAAAmGLr1q156U44U+3bt1+2bFmrVq2UiXIZ3Hzy3dWczPbxG6VVPlg1a+PKWRu0cUlnVs7aKGGNjHcf3EmG41+dor1VrUHFag0qKQAAAAAAgJy5ePFicnJyjRo1lFnJCmW1svLy5cubtGBugpsdByLGz7iSkzlbNHRv0dAM7cEytfzoTG1k7NzhGaf3qPP66YMXsg9uggJCzh+7FBUWXapicUl5bO3yvf5RamrqxKHfterS5PF29bKfMzoi5uyRiyE3b1esWbZctVI2tjYKAAAAAADksxMnTtSpU0flA1mtrLwgghvJYv5cWDuHc6p8ICGLyrM9mw9O/WCe0TorjZj6uqOzg8qDDT9sOXfk4rvfvJbVDGlp6ujuUzUfq5L9erav3zvz4396LXL3cp20YoyHt5sCAAAAAAD5yd/fv3Xr1tnMsONkfDbvtqjhmNVblSpV+vPPP5WJclnHJP/q0eSEhCyG6jZZyX6GtLS0hRNXVKxV9oP/veni5rRr498zxizcv/VIy86 lass=\"tag\">Trainer Tip<\/div><div class=\"body\">A patch that <strong>glows gold and sparkles<\/strong> hides a <strong class=\"shiny-word\">SHINY<\/strong>! Shinies are rare (about 1 in 512), so bring your best ball. Each patch searches once; when all four are used, click the biome again for a fresh set. The last three biomes are late-game: their rarest residents, Legendaries included, appear only when your strongest Pokemon hits level 46.<\/div><\/div>\n    <\/section>\n\n    <section class=\"sec\" id=\"wild-encounter\"><h3><span class=\"n\">6<\/span>A Wild Pokemon Appears!<\/h3>\n    <p>Walk into the tall grass and up pops <strong>\"A wild Pokemon appeared!\"<\/strong> You'll see its picture, name, Pokedex number, type, and level. Catch difficulty rides mostly on the <strong>kind<\/strong> of Pokemon, and higher-level ones are harder to hold.<\/p>\n    <p>The <strong>Bag<\/strong> rail beside the arena shows your four ball options and counts. Click one to throw. The rule: <strong>better balls, better odds.<\/strong><\/p>\n    <ul>\n      <li><strong>Poké Ball:<\/strong> your everyday ball.<\/li>\n      <li><strong>Great Ball:<\/strong> a better chance.<\/li>\n      <li><strong>Ultra Ball:<\/strong> best chance of the three.<\/li>\n      <li><strong>Master Ball:<\/strong> never fails. Rare and precious (see step 8).<\/li>\n    <\/ul>\n    <figure class=\"shot\"><div class=\"frame\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAApQAAAGiCAIAAADWZsFGAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAClKADAAQAAAABAAABogAAAABZXn6HAABAAElEQVR4Aey9B2Bcx3UuvL3vAthF7x3sIEWxiKRIiRIlU8WSbMlSYid5TuLYjuM4Tv7EeY6T2H55Tpz2bMd24rjLtiLLKlaXLImUSLH3XtCJ3hfb+/7fmdldLEAABEmQBMAzWNydnTv12537zTlzZkb5xBNPKGbCxUcziaf5FYo4/Wl1uvW33bZ169aK8orRiOxjBBgBRoARYATmBQKtra2vv/76nj17QqGQUqmcrE3xsQw5WbQpcpBJ1EuWLJks8fTD09ha1IsIO+HgUas1923d+rsf+51sR3YymN8ZAUaAEWAEGIH5g0BmZmZ9fT3ac+7cuVgsNo59p+Bs3BoXOQXKZOGIoEpFmgkPMTf+6Zp8hSPhRYsWPf7YYzqdbiaK4D tion>\n\n    <section class=\"sec\" id=\"catching\"><h3><span class=\"n\">7<\/span>Catching (and What Happens If It Breaks Free)<\/h3>\n    <p>After you throw, one of three things happens:<\/p>\n    <ol>\n      <li><strong>You caught it!<\/strong> A green <strong>\"Gotcha!\"<\/strong> appears. Click <strong>Done<\/strong> and your new friend joins your collection. Once in a while the ball snaps shut instantly: a <em>critical capture<\/em>, just for show.<\/li>\n      <li><strong>It broke free.<\/strong> The ball pops open but the Pokemon stays. You'll see an orange <strong>\"broke free! Throw another ball\"<\/strong> message. Throw again, as long as you have balls.<\/li>\n      <li><strong>It fled.<\/strong> A spooked Pokemon runs, the window closes, and that patch is spent. There's always another.<\/li>\n    <\/ol>\n    <figure class=\"shot\"><div class=\"frame\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAApQAAAGiCAIAAADWZsFGAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAClKADAAQAAAABAAABogAAAABZXn6HAABAAElEQVR4Aex9B2BcxZn/9iateu/VRXLvBVewsU0xHY5AElIhXI4jl0tySe5C8k/IpV56QghJgEBMb8bG2FRj3Jtc1Huxel9t3/3/vpnd1apacsOSv9HqvXnzpr3fK7/5vvlmRnnXXXcpLoTz9mfiDfIrFF760+p0y5cu3bhxY2ZGZn9E9jECjAAjwAgwApMCgaqqqu3bt+/du9fhcCiVypGuyTuQIUeKNkoOMol6xowZIyUee3gQW4t6EWH7HDxqtWbTxo2fvufemOgYfzDvGQFGgBFgBBiByYNARETE7NmzcT3FxcUej2cQ+47C2Tg1KHIAlJHCEUEViHQhPMTc+Ket/+d0OfPy8u68/XadTnchiuA8GAFGgBFgBBiByxEB0NzmzZvnzp3rdrtHrx8IO+AQM9gfnBDhwYfB/gtA3v68fTI31YN+ROIe+inWrl7NzB0MOvsZAUaAEWAEJigCkKqdTqddOGjIcRh8IVqtdtmyZcEh8A/i4EGHwZFHORUcDX7NoONBh8OzvlIxVJ0vKRxbELbYEn8jNxwmJCQMypYPGQFGgBFgBBiBiYWAy+UCW7cJZ7VaUXmj0RgVFRUTEwMBVaPx8Wl8fPwo1xWgZz+9SvJECp+OXEYIKMxxGPAHZzs8eVNmgQwpevCB0kfLgsL9J0QKL6iaorpFfFEzr9vrkSweXCr7GQFGgBFgBBiBCYSAzWarEA48nZiYGBcXh8pbLBb0cBcUFGQJZzAYhl5REFv7CFOS45CYvoiSqoM5O9gfSDUMeQseDkQYUorSK8TufgpHVCRBPNoqvGBu4aeE+DF1B6BkDyPACDACjMBERKCnp+fgwYOo+ZIlSyBnD7qE1tbWEydONDY2Lly40Gw2B5/1ETJRJPiQnNj7/CJAKrL7QyimIHB4hpW5RaphDd \n    <section class=\"sec\" id=\"give-exp\"><h3><span class=\"n\">9<\/span>Spend XP to Level Up<\/h3>\n    <div class=\"body\">\n    <p>Leveling climbs a Pokemon's level and readies it to <strong>evolve<\/strong>. In the <strong>Trainer Hub<\/strong>, find its card and the <strong>Give EXP<\/strong> button.<\/p>\n    <ol>\n      <li>Type how much XP you want to spend in the box.<\/li>\n      <li>Click <strong>Give EXP<\/strong>.<\/li>\n      <li>The Pokemon's level rises, and that XP comes out of your balance. One XP token = one experience point.<\/li>\n    <\/ol>\n    <\/div>\n    <figure class=\"shot\"><div class=\"frame\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAKUCAIAAABXLtFEAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAACWKADAAQAAAABAAAClAAAAACDeYdCAABAAElEQVR4AeydB3xUVdr/M5nJpPdeCAQIIYTeuyBFsSOy7rquWFa3+equ7uq6r6+rbnXX/7rq7lrX3hBRQXrvJBAgoRPSSALpvU1mJjP/7+TCZUgmySARkvBc+EzOPfec5zznd+89v/s8p2msVquLHIKAICAICAKCwNWKgOvVWnGptyAgCAgCgoAgYENAiFCeA0FAEBAEBIGrGgFd19a+yWrpWoHfqTR3jXwHfKcAi3BBQBAQBK48AiaTqb6+vrm52dPT08vLq61CXUaEZhfr4abqwmaDxkXTtphuGAMHBmn1Q/V+HhptN1RPVBIEBAFBQBC4RATy8vIyMzPr6uqgQI1GYzAY+I2JiRkyZIibm5sqXNMlg2UYb5Nvbkg2VMCBPYUI0VmrcRnq5jdI76vCIQFBQBAQBASBXoCA0WjctWsXv4MHD46OjtZqbQYPfFddXX3ixInCwsKJEyeGh4fDi8R3jUUIqRisFsafaluE9ggQFbu1sUf5cnsEsKKkICAICAJXFgH4b/v27ZGRkbCgq+v5LjBoLyAgYMKECaWlpampqSNGjCANkedTXKLeDv2hFKBxbflxtf3hp7v5TR2qfYlQSHZBQBAQBASBK4hAcnJyVFRUKxa01yc0NHTy5Mn79u2rra0lvsuI0L4MJeyqcTUZjQ01jYbGpuqyGmOTsa4GA6z1tEUbT34rO9JhRiRBvW2VkRhBQBAQBASBqwGB/Px8RsfEx8fb24JtK+7v7z9gwIAjR44wiKZd16jZbF25rSIzr0Gr8orVxc9H+4Mbwz09OqdPWKogp/DTV5YljOyv02tPZxePnzlizaebZi2YPm72qGaTWVFLq3U1NBqxS9093JvNzW11VWNI6aLR2KcxNDRhYuo93NQlAUhjsViMjSYPb3dLM67a1qSrSpOAICAICAKCQK9EICsrKzExUekU7LiCgwYNWrt2LSNo2iVCOKSx0dxQb3E9N6YSWtHpXEzNFk9n7EgbB1kHDut7y6I5JjO0p4GlYKbiglLFO4rVZnXRpGxK37kyRafXzVk4PWncIOiTfNCkVqeF9qzmZo2ObkeN2dScdTS32WwZPHog3Z3wvLHJtHv9vsAQ/0lzxhgMTdAe5WUfz1/10UaL0dx/eNy87890c9dRFp2ALbajrZsUOcKOH out note\"><div class=\"tag\">Heads Up<\/div><div class=\"body\">Pour in more XP than a Pokemon needs and the game spends only what's needed, leaving the rest in your balance. You never waste XP. Different species level at different speeds (engineers can read why in Part Three).<\/div><\/div>\n    <\/section>\n\n    <section class=\"sec\" id=\"evolve\"><h3><span class=\"n\">10<\/span>Evolve Your Pokemon (Levels &amp; Stones)<\/h3>\n    <p>Some Pokemon can transform into a bigger, more powerful form. This is <strong>evolving<\/strong>, and it happens two ways:<\/p>\n    <ol>\n      <li><strong>By level:<\/strong> when a Pokemon reaches its evolution level, a blue <strong>Evolve<\/strong> button appears on its card. Click it. (No button? It either can't evolve or isn't there yet; use Give EXP.)<\/li>\n      <li><strong>By stone:<\/strong> some species (Eevee, Pikachu, Growlithe) evolve with an <strong>Evolution Stone<\/strong> instead. Buy the right stone at the Mart and the card offers the evolution. Using it consumes the stone.<\/li>\n    <\/ol>\n    <p>Either way, your Pokemon keeps its level, its shininess, and any nickname. A Charmeleon becomes a mighty Charizard.<\/p>\n    <figure class=\"shot\"><div class=\"frame\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAApQAAAGiCAIAAADWZsFGAAAAAXNSR0IArs4c6QAAAERlWElmTU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAClKADAAQAAAABAAABogAAAABZXn6HAABAAElEQVR4Aey9B2BU15X/rymaUe+9oYoAIXpvBmxjg41xiUtsp+8mzjrJxsnuZpNsfpv95ZdN/mmbbMrGceJNnDiOY8fGxoALvZkmilABIUANVFHvmvL/jC48nmc0IwkEppwX8nzffeeee+539N73nnPLMzidTj85BAFBQBAQBAQBQeDGQcB445gqlgoCgoAgIAgIAoKACwEhb/k7EAQEAUFAEBAEbjAEzGNur8PPz+bn8Lthg/FGg8HsZxhzWEShICAICAKCgCCgEGDA2maz2e12h8NB2mQyGQwGf39/o3GkHvUYkzeUXWfrqbH12v2cNyIBYn+40ZzuHxJkGCmC8rcoCAgCgoAgIAiMHIH+/v6Ojo6amprW1lb4G/KGuUNCQhISEmJjY61W60go3DC2E9ZaHf27es53Oe03InMr6J1+zlxz6LSAiJH/EiIpCAgCgoAgIAiMBIGenp7CwsKGhoakpKT4+Pjg4GCouq+vr7m5uaqqCg1TpkyBwvHFfWsbY/KuHOje29tsNty43O2K+EebLLcFxpokeO77b0fuCgK
