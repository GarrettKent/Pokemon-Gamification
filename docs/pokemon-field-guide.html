5\" height=\"15\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> Professor Oak<\/div><div class=\"body\">That's everything you need! Get out there, explore every biome, and catch 'em all!<\/div><\/div>\n    <\/section>\n    <\/article>\n\n    <div class=\"divider\"><span class=\"line\"><\/span><svg class=\"pokeball\" width=\"30\" height=\"30\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg><span class=\"line\"><\/span><\/div>\n\n    <!-- ================= PART THREE : UNDER THE HOOD ================= -->\n    <article class=\"dexmode\">\n      <div class=\"guide-banner dex\" id=\"dex-guide\">\n        <div class=\"ball-watermark\"><svg class=\"pokeball\" width=\"150\" height=\"150\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg><\/div>\n        <div class=\"kicker\">Part Three · Under the Hood · For the Engineers<\/div>\n        <h2>The Machinery Behind the Grass<\/h2>\n        <p>Every number below is drawn from the deployed package: the reward engine, the encrypted encounters, the catch math, and the canon it maps to.<\/p>\n      <\/div>\n\n      <section class=\"sec\" id=\"architecture\"><h3><span class=\"n\">1<\/span>The Plumbing at a Glance<\/h3>\n      <p>The whole game is an <strong>unlocked, unprefixed Salesforce package<\/strong> with a tiny footprint:<\/p>\n      <ul>\n        <li><strong>Two custom objects, ever.<\/strong> <code>Pokemon_Trainer__c<\/code> is your save file: currency, XP bank, ball and stone counts, roll-ups, the encounter ledger. <code>Pokemon__c<\/code> is one caught Pokemon (stats, moves, shiny flag), guarded by 9 validation rules.<\/li>\n        <li><strong>Three config types<\/strong> (custom metadata): game tuning (<code>Pokemon_Settings__mdt<\/code>: every price, rate, and offset in this guide, plus the kill switch), the six biomes (<code>Pokemon_Biome__mdt<\/code>), and the reward rules (<code>Pokemon_Reward_Rule__mdt<\/code>, created by admins, none ship in the box).<\/li>\n        <li><strong>Six Apex classes<\/strong>: a thin <code>@AuraEnabled<\/code> controller, a mechanics helper, catch math, a species catalog, a trainer trigger helper, and the reward engine.<\/li>\n        <li><strong>One packaged trigger<\/strong>, on the Trainer itself (clamps counts non-negative, stamps the owner key). The package owns <em>no<\/em> triggers on your work objects: subscribers wire the engine into their own with one line.<\/li>\n      <\/ul>\n      <p>The controller follows a strict <strong>results-map contract<\/strong>: every method returns a <code>status / message / data<\/code> map and never throws to the UI. Every decision that matters is made server-side.<\/p>\n      <\/section>\n\n      <section class=\"sec\" id=\"reward-engine\"><h3><span class=\"n\">2<\/span>The Reward Engine<\/h3>\n      <p>The engine is <strong>object-agnostic<\/strong>: it names no specific object anywhere. A subscriber wires it into any after-insert/after-update trigger with exactly one line:<\/p>\n      <div class=\"formula\">PokemonRewardEngine.run(Trigger.new, Trigger.oldMap, Trigger.operationType);<\/div>\n      <p>Each rule declares: which object, which operations, an <strong>edge field<\/strong> and its \"done\" values, optional <strong>filter<\/strong> and <strong>exclude<\/strong> field/value pairs, the ₽ and XP amounts, and an optional <strong>multiplier field<\/strong> with a cap. All value matching is trimmed and case-insensitive; admin-typed <code>' closed '<\/code> matches <code>Closed<\/code>.<\/p>\n      <ul>\n        <li><strong>Transition-edge idempotency:<\/strong> on update, a rule pays only when the OLD value was <em>not<\/em> done and the NEW value <em>is<\/em>. Re-saving a closed record pays zero. The guard catches re-saves, not lifetime history, so a record reopened and re-closed pays again as a new edge.<\/li>\n        <li><strong>Blank edge = insert-only:<\/strong> a rule with no edge field (like Time Worked) pays only on insert, regardless of configuration; otherwise it would pay on every save.<\/li>\n        <li><strong>Null never pays:<\/strong> if a filter is configured and the record's value is null or unmatched, skip; if an exclude is configured and the value is null, also skip. Null pays under neither side.<\/li>\n        <li><strong>Multipliers:<\/strong> the rule can read a numeric field per record (hours worked, say) and scale the payout. Negative clamps to 0, values above the cap clamp to it (Time Worked caps at ×12), blank means ×1.<\/li>\n        <li><strong>Owner-only:<\/strong> the payout goes to the record's <code>OwnerId<\/code>, and only if it's a User; queue-owned records are skipped. The owner resolves to a Trainer via a stamped key, and an owner with no Trainer is skipped. The engine runs <code>without sharing<\/code> so the owner gets paid even when a <em>different<\/em> user's save fires the trigger.<\/li>\n        <li><strong>Sum, round once, cap:<\/strong> per-user amounts accumulate as raw decimals across all rules and records in the transaction, get rounded HALF-UP <em>once<\/em> per user, and only then does the daily cap clamp the currency grant. <code>Currency_Today__c<\/code> resets when <code>Earn_Date__c<\/code> rolls to a new day. XP is never capped.<\/li>\n        <li><strong>One SOQL + one bulk UPDATE, synchronous<\/strong>, validated by a 200-record bulk test. No Queueable.<\/li>\n      <\/ul>\n      <\/section>\n\n      <section class=\"sec\" id=\"silence-guarantee\"><h3><span class=\"n\">3<\/span>The Silence Guarantee<\/h3>\n      <p>The engine's prime directive: <strong>a reward failure must never affect the subscriber's save.<\/strong> Five layers enforce it:<\/p>\n      <ol>\n        <li><strong>A whole-body, non-rethrowing catch<\/strong> around <code>run()<\/code>: any exception is logged to debug and swallowed.<\/li>\n        <li><strong>Per-rule isolation:<\/strong> each rule runs in its own try/catch, so one malformed row (a typo'd field name, a non-numeric multiplier) skips itself without zeroing the others' payouts.<\/li>\n        <li><strong>A recursion guard reset in <code>finally<\/code>:<\/strong> the trainer UPDATE can't re-trigger the engine, and a thrown award can't leave the guard stuck.<\/li>\n        <li><strong>Governor pre-flight:<\/strong> <code>LimitException<\/code> is uncatchable in Apex, so before its one query and one DML the engine checks headroom and yields rather than spend the transaction's last slot.<\/li>\n        <li><strong>Zero contact:<\/strong> no <code>addError<\/code>, no mutation of trigger records, no callouts, no setup-object DML.<\/li>\n      <\/ol>\n      <p>Net effect: if the game breaks, no save ever notices. The kill switch (<code>Automation_Enabled__c<\/code>, shipped OFF) sits in front of all of it.<\/p>\n      <\/section>\n\n      <section class=\"sec\" id=\"encrypted-grass\"><h3><span class=\"n\">4<\/span>The Grass Is Encrypted<\/h3>\n      <p>When the Biomes page loads, the server pre-rolls all six biomes at once — four patches each, drawn by weighted random selection — so switching between biomes never re-deals the grass; only a page refresh does. Each patch is minted an <strong>AES-128 encrypted token<\/strong> (species, level, shiny, owner, timestamp). The browser receives exactly two things per patch: that opaque token and a single boolean, <code>isShiny<\/code>, which drives the golden tile glow.<\/p>\n      <ul>\n        <li><strong>Nothing to inspect:<\/strong> species and level aren't client-side anywhere. Dev-tools read only ciphertext.<\/li>\n        <li><strong>Reveal on click:<\/strong> walking into the grass sends the token back; the server decrypts and returns the encounter. Tokens are owner-locked (another trainer's is refused) and expire after <strong>60 minutes<\/strong>.<\/li>\n        <li><strong>Single-use:<\/strong> a caught or fled encounter's SHA-256 token hash is ledgered on the Trainer under a <code>FOR UPDATE<\/code> lock; replaying a captured token (say, a known-shiny one) is refused with \"already been searched.\" <em>Broke free<\/em> stays live so you can throw again at the same patch. Ledger entries self-prune past the token TTL.<\/li>\n      <\/ul>\n      <div class=\"callout pokedex\"><div class=\"tag\">Pokédex Data<\/div><div class=\"body\">The shiny outcome is decided when the patch is rolled (that's what makes the tile glow). If the client could read or replay tokens, a glowing patch would be a shiny vending machine. Encryption plus the consumed-token ledger close both doors.<\/div><\/div>\n      <\/section>\n\n      <section class=\"sec\" id=\"capture-formula\"><h3><span class=\"n\">5<\/span>The Capture Formula<\/h3>\n      <p>Every throw resolves to one server-side draw in <code>pokemonCatchLogic.ComputeCatchProbability<\/code>. The dice are cast in Apex before the ball leaves your hand:<\/p>\n      <div class=\"formula\">P = min(1, (rate × ball / 765)^0.75 × levelFactor × 1.5)<\/div>\n      <ul>\n        <li><code>rate<\/code> is the species' capture rate, read from the server-side seed (Magikarp 255, Bulbasaur 45, Mewtwo 3), never sent by the client.<\/li>\n        <li><code>ball<\/code>: Poké ×1.0, Great ×1.5, Ultra ×2.0. A <strong>Master Ball short-circuits to P = 1.0<\/strong> before any math runs.<\/li>\n        <li><code>765 = 255 × 3<\/code> normalizes the rate so even the easiest catch is not automatic on a Poké Ball.<\/li>\n        <li>The <strong>0.75 exponent<\/strong> gently lifts low odds and softens high ones.<\/li>\n        <li><code>levelFactor<\/code> makes high-level wilds harder to hold: ×1.0 through Lv 20, ×0.85 to 40, ×0.70 to 60, ×0.55 to 80, ×0.40 above.<\/li>\n        <li>The trailing <strong>×1.5<\/strong> is the configured catch-rate multiplier (<code>Catch_Rate_Multiplier__c<\/code>): friendly pilot odds, tunable without code.<\/li>\n      <\/ul>\n      <p><strong>Worked examples<\/strong> (low-level wilds): a Caterpie (rate 255) on a Poké Ball is <code>(0.3333)^0.75 × 1.5 ≈ 66%<\/code>; on an Ultra Ball the odds cap at 100%. A Beldum (rate 3) on a Poké Ball is about <strong>2.4%<\/strong>, and a level-45+ legendary lands near <strong>1.6%<\/strong> after the level factor. That's the throw a Master Ball would trivialize — if any were still in circulation.<\/p>\n      <p>A failed throw isn't the end: the server rolls again to decide <strong>break free<\/strong> (stay and throw again) versus <strong>flee<\/strong> (encounter over, patch spent). Flee chance scales with rarity: <strong>10%<\/strong> common, <strong>12.5%<\/strong> uncommon, <strong>15%<\/strong> rare per missed throw. Your ball is consumed before the outcome resolves, caught or not.<\/p>\n      <div class=\"callout pokedex\"><div class=\"tag\">Pokédex Data<\/div><div class=\"body\">Canon mapping: the Gen III+ HP-independent core. Real games add an HP term that maxes at full HP; with no battles, every wild sits at full HP, so the math reduces to the rate × ball core, the exponent standing in for the shake-check chain.<\/div><\/div>\n      <\/section>\n\n      <section class=\"sec\" id=\"shiny\"><h3><span class=\"n\">6<\/span>Shinies &amp; Critical Captures<\/h3>\n      <p>Shininess is rolled <strong>when the patch is minted<\/strong>, at a clean <code>1 / 512<\/code> (<code>Shiny_Rate__c<\/code>, Apex fallback 512). The outcome rides inside the encrypted token and drives the glow and shiny artwork. Catching honors what the grass already decided; <code>Is_Shiny__c<\/code> latches forever on the caught row.<\/p>\n      <p>Your <strong>starter<\/strong> gets the same 1/512 roll at onboarding: a slim chance Professor Oak hands you a shiny first partner.<\/p>\n      <p><strong>Critical captures<\/strong> are the reverse, purely cosmetic: on a successful catch the server rolls <code>1 in 20<\/code> (<code>Critical_Capture_Rate__c<\/code>) for the instant-snap animation. No effect on odds.<\/p>\n      <div class=\"callout pokedex\"><div class=\"tag\">Pokédex Data<\/div><div class=\"body\">Canon: real games started shinies at 1/8192 (Gen II–V) and halved to 1/4096 in Gen VI+. This app is kinder at 1/512, so a pilot trainer meets one in a season.<\/div><\/div>\n      <\/section>\n\n      <section class=\"sec\" id=\"growth-curves\"><h3><span class=\"n\">7<\/span>The Six Growth Curves<\/h3>\n      <p>Leveling spends Experience Tokens one-for-one into a Pokemon's EXP, and the level recomputes to the highest threshold met on its species' <strong>growth curve<\/strong>. Tokens past Level 100's requirement aren't spent. All six canonical curves match their classic definitions:<\/p>\n      <div class=\"tablewrap\"><table>\n        <thead><tr><th>Curve<\/th><th>EXP to L100<\/th><th>Formula (core)<\/th><th>Notable species<\/th><\/tr><\/thead>\n        <tbody>\n          <tr><td>Erratic<\/td><td>600,000<\/td><td>piecewise by level band<\/td><td>Feebas, the Sinnoh fossils<\/td><\/tr>\n          <tr><td>Fast<\/td><td>800,000<\/td><td><code>4L³/5<\/code><\/td><td>Jigglypuff, Chansey, Togepi<\/td><\/tr>\n          <tr><td>Medium Fast<\/td><td>1,000,000<\/td><td><code>L³<\/code><\/td><td>Pikachu, Eevee, the largest share of the dex<\/td><\/tr>\n          <tr><td>Medium Slow<\/td><td>1,059,860<\/td><td><code>1.2L³ − 15L² + 100L − 140<\/code><\/td><td>all 12 regional starters, Abra<\/td><\/tr>\n          <tr><td>Slow<\/td><td>1,250,000<\/td><td><code>5L³/4<\/code><\/td><td>Magikarp, Beldum, pseudo-legendaries<\/td><\/tr>\n          <tr><td>Fluctuating<\/td><td>1,640,000<\/td><td>piecewise by level band<\/td><td>a handful of late-bloomers<\/td><\/tr>\n        <\/tbody>\n      <\/table><\/div>\n      <div class=\"callout pokedex\"><div class=\"tag\">Pokédex Data<\/div><div class=\"body\">The quirk fans love survives intact: Medium Slow totals LESS than Slow at L100 but front-loads its cost, so starters feel sluggish early then snap forward. Magikarp's brutal 1,250,000-EXP climb to Gyarados is faithful. (The medium-slow formula floors at 0 so low-level EXP can never go negative.)<\/div><\/div>\n      <\/section>\n\n      <section class=\"sec\" id=\"biomes\"><h3><span class=\"n\">8<\/span>The Six Biomes &amp; Rarity Tiers<\/h3>\n      <p>Each biome is a <code>Pokemon_Biome__mdt<\/code> row with a JSON pool of dex numbers. A species' tier derives from its capture rate (<strong>≥120 common, ≤44 rare, in between uncommon<\/strong>), and the weighted draw gives each common a weight of 12, uncommon 6, rare 2. The first three biomes carry the classic 80-species pool (50/25/5); the late-game three skew toward uncommons and rares:<\/p>\n      <div class=\"tablewrap\"><table>\n        <thead><tr><th>Biome<\/th><th>Pool (c/u/r)<\/th><th>Type themes<\/th><th>Notable rares<\/th><\/tr><\/thead>\n        <tbody>\n          <tr><td>Verdant Meadow<\/td><td>50 / 25 / 5<\/td><td><span class=\"tps\"><i class=\"tp tp-grass\">grass<\/i><i class=\"tp tp-bug\">bug<\/i><i class=\"tp tp-normal\">normal<\/i><i class=\"tp tp-flying\">flying<\/i><\/span><\/td><td>Snorlax, Scizor, Skarmory<\/td><\/tr>\n          <tr><td>Rocky Cavern<\/td><td>50 / 25 / 5<\/td><td><span class=\"tps\"><i class=\"tp tp-rock\">rock<\/i><i class=\"tp tp-ground\">ground<\/i><i class=\"tp tp-steel\">steel<\/i><i class=\"tp tp-fighting\">fighting<\/i><i class=\"tp tp-poison\">poison<\/i><i class=\"tp tp-dark\">dark<\/i><\/span><\/td><td>the Beldum line, Steelix<\/td><\/tr>\n          <tr><td>Azure Shore<\/td><td>50 / 25 / 5<\/td><td><span class=\"tps\"><i class=\"tp tp-water\">water<\/i><i class=\"tp tp-ice\">ice<\/i><i class=\"tp tp-flying\">flying<\/i><i class=\"tp tp-normal\">normal<\/i><\/span><\/td><td>Mantine, Relicanth, Snorlax<\/td><\/tr>\n          <tr><td>Scorched Summit<\/td><td>14 / 49 / 10<\/td><td><span class=\"tps\"><i class=\"tp tp-fire\">fire<\/i><i class=\"tp tp-fighting\">fighting<\/i><i class=\"tp tp-dragon\">dragon<\/i><\/span><\/td><td><strong>Moltres, Entei, Ho-Oh, Dialga, Palkia<\/strong><\/td><\/tr>\n          <tr><td>Mystic Mirage<\/td><td>46 / 57 / 15<\/td><td><span class=\"tps\"><i class=\"tp tp-psychic\">psychic<\/i><i class=\"tp tp-fairy\">fairy<\/i><i class=\"tp tp-poison\">poison<\/i><\/span><\/td><td><strong>Mewtwo, Lugia, Latias, Latios<\/strong><\/td><\/tr>\n          <tr><td>Spectral Graveyard<\/td><td>33 / 45 / 5<\/td><td><span class=\"tps\"><i class=\"tp tp-ghost\">ghost<\/i><i class=\"tp tp-dark\">dark<\/i><i class=\"tp tp-poison\">poison<\/i><\/span><\/td><td><strong>Giratina, Darkrai<\/strong>, Absol<\/td><\/tr>\n        <\/tbody>\n      <\/table><\/div>\n      <p>Biomes are callout-free: pools resolve against the local species seed, and only sprites and background art travel the network. Four patches per page load (a per-biome setting), each single-use.<\/p>\n      <div class=\"spritegrid\">\n        <div class=\"sprite\"><div class=\"pad\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgBAMAAAAQtmoLAAAALVBMVEUAAAAQEBBBKRhzSjGDg4OkYlq9KSC9vb3Ng1rmvWLuYkH/rHP/7pz/9r3///9WNuoZAAAAAXRSTlMAQObYZgAAAa5JREFUWMPt1LFKA0EQBuCLh9buaUAbSTZc1CBBPIQE4isIWRmIRZqgB2onvoAegQ3YeEHIQBqbFIe1jZWCkIPtbLSwEKx9BvcI1jdrYbV/vR+zs8Os49jY2NjY/CXutiFoGIJABiZi3pWRNAHdhpRGJTSIgo+YfqNXGe19vHED0O++I2KJChaODxHLjF7h7OGYeR6Qm154TO7qa55PB0kyEXWPt8mA1yYpcjpwqr2aUjGHRSqohSca+NCmirnkXqUcQF5RJ8G3FPrQkVIQhYt4qwtI2RcGoJMBKFEBwoYGAkpuQNhWDcYvflbA5w3ZiHKFm47VM8h+H0QMQUde5oGWUhqALiDiA909FQCIzaddaLPcAbauf8E4LbZXIicfTFXqg9BAsSLkfyDN1nSsR61bUKoIkH8lt4mDYZy1oK6XGCNMbiUYNtEXehzTG9KoC3rUGJcRByMacFYzgQxHeEkDhZkorw6oSzQTcZmRF7tQQRyS/75sT3ussmNwnFd7+vegg/X9sFcNQ/KV5i6+vPppcnROrsBY4es7ZMygaWf50+i4ftdFx8bGxsbm3/IDKBea6AbhhdgAAAAASUVORK5CYII=\" alt=\"Pidgey\"><\/div><div class=\"dex\">#016<\/div><div class=\"nm\">Pidgey<\/div><div class=\"cap\">Common · Verdant Meadow staple<\/div><\/div>\n        <div class=\"sprite\"><div class=\"pad\"><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgBAMAAAAQtmoLAAAAHlBMVEUAAAAQEBBBOTFqalKUnJyclIO0tJzF1azN3s3///+CLIGrAAAAAXRSTlMAQObYZgAAAZRJREFUGBntwTFunEAABdC/cAFmE1ZJN2ANTpk1YfYMKQf0t18QH6V1FFBKdzlCctusoxQuwHZrad5DFEVRFL11dY3XS0vcaCzwWulpLiR1e7zSaZFUy8niJYkFkC7yqmf1agHUJbYlfrBAevFDO82ia4F6WSw23c66ALtP79pWwbjmiGSalxZb0lleGXbfHnKa97/2rLNqkKbP2HCaNYwZkp8PPH/4+Lshs6qSpu9Yl87ychluf3yRhq9/GvLovLwmi1WnWYMCklmPhobkXXnupekeq06zH52zif4byapnpUH3WJMu6mmY7cS7sqwlkpVMIy9ZrEilsciZIe8kjdVIsh3yvD1fZLHGDzzkAdgfzxJbXlWGYU8jizVeRpc8w87x0Q3L5jw40rDHqkRSw4CD4z8lXde0jqTFulIaGXZy7Oq6IdmRoW4YsKWURuZs2ZBsyODY0o8ZNhmJgdbxqmOwCXuSGbYdRjIgyXkVLFCO7AKekRgyAGlhjLEAEslneFZBiycqXfACg6eSIkMURVEURSv+ApO/fV0rwDRoAAAAAElFTkSuQmCC\" alt=\"Geodude\"><\/div><div class=\"dex\">#074<\/div><div class=\"nm\">Geodude<\/div><div class=\"cap\">Common · R 70+ → Lv 45), which also catches trade evolutions the seed doesn't link.<\/li>\n        <li><strong>Legendaries and mythicals floor at Lv 45.<\/strong><\/li>\n      <\/ul>\n      <p>Species whose floor exceeds your band's ceiling are filtered out of the draw. Since a rare's ceiling is anchor −1, the arithmetic yields the gate: <strong>legendaries enter the pool only when your strongest Pokemon is level 46 or higher<\/strong>. The level itself is sealed inside the encrypted encounter token at patch time. The browser never sends a level; the server reads it back out of the token at catch time, so a tampered client can't mint a maxed Pokemon.<\/p>\n      <\/section>\n\n      <section class=\"sec\" id=\"economy\"><h3><span class=\"n\">10<\/span>Economy Invariants<\/h3>\n      <ul>\n        <li><strong>Starting grant:<\/strong> ₽500 + 10 Poké Balls, once, at trainer creation. Starter arrives at Lv 2–6 with its own shiny roll.<\/li>\n        <li><strong>Mart prices<\/strong> come from settings, not code: ₽200 / ₽400 / ₽600 for balls, ₽5,000 per evolution stone (all eight). The Master Ball is absent from the price map entirely, unbuyable at any price.<\/li>\n        <li><strong>Master Balls:<\/strong> unobtainable, period. The milestone grant is switched off, and the trainer trigger reverts any ball-count change that doesn't come from game code — a Master Ball count can never go up.<\/li>\n        <li><strong>The XP bank<\/strong> (<code>Experience_Tokens__c<\/code>) is the only spendable XP; the roll-up total on the trainer is display-only. Spending past Level 100 is refused, not burned.<\/li>\n        <li><strong>Clamps everywhere:<\/strong> the trainer trigger floors currency, XP, ball, and stone counts at zero on every save; 9 validation rules guard the Pokemon (levels 1–100, EXP can't decrease, traded can't revert, species can't change, 12-char nicknames…).<\/li>\n        <li><strong>Access is one permission set:<\/strong> app, tabs, objects, classes. Rival and (future) trade eligibility both key off actively holding it.<\/li>\n        <li><strong>Server authority, always:<\/strong> the client sends intents (a token, a ball type, a cart) and receives outcomes. Odds, shinies, levels, prices, and payouts are computed in Apex from server-held data.<\/li>\n      <\/ul>\n      <div class=\"callout oak\"><div class=\"tag\"><svg class=\"pokeball\" width=\"15\" height=\"15\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> Professor Oak<\/div><div class=\"body\">Well now! You've seen how the whole thing ticks: a game that pays you for work you'd do anyway, and never gets in your way. Now, back to the tall grass with you!<\/div><\/div>\n      <\/section>\n    <\/article>\n  <\/div>\n<\/main>\n\n<div class=\"badgestrip\" aria-label=\"Gym Badges collected\">\n  <i style=\"--i:0;--c:#9aa0a8\"><\/i><i style=\"--i:1;--c:#3ba7e0\"><\/i>\n  <i style=\"--i:2;--c:#f4a72b\"><\/i><i style=\"--i:3;--c:#8e6fd6\"><\/i>\n  <i style=\"--i:4;--c:#ef6ea8\"><\/i><i style=\"--i:5;--c:#f0c419\"><\/i>\n  <i style=\"--i:6;--c:#e0492f\"><\/i><i style=\"--i:7;--c:#4caf6e\"><\/i>\n<\/div>\n<div class=\"grass-edge\" aria-hidden=\"true\"><\/div>\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <div><svg class=\"pokeball\" width=\"34\" height=\"34\" viewBox=\"0 0 100 100\" aria-hidden=\"true\"><path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#EE1515\"><\/path><path d=\"M4,50 A46,46 0 0 0 96,50 Z\" fill=\"#ffffff\"><\/path><rect x=\"4\" y=\"45\" width=\"92\" height=\"10\" fill=\"#16181d\"><\/rect><circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#16181d\" stroke-width=\"5\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"14\" fill=\"#ffffff\" stroke=\"#16181d\" stroke-width=\"6\"><\/circle><circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#ffffff\"><\/circle><\/svg> <b>Pokémon Gamification<\/b> · The Field Guide<\/div>\n    <div class=\"mono\">The Program · Trainer's Guide · Under the Hood · built for the pilot<\/div>\n  <\/div>\n<\/footer>\n\n<script>\n(function () {\n  if (!('IntersectionObserver' in window)) return;\n  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n  var io = new IntersectionObserver(function (entries) {\n    entries.forEach(function (entry) {\n      if (!entry.isIntersecting) return;\n      entry.target.classList.add('inview');\n      io.unobserve(entry.target);\n    });\n  }, { threshold: 0.35, rootMargin: '0px 0px -8% 0px' });\n  document.querySelectorAll('.guide-banner, .sec > h3, .formula, .badgestrip')\n    .forEach(function (el) { io.observe(el); });\n})();\n<\/script>\n\n<script>\n(function () {\n  var nav = document.querySelector('.nav');\n  var burger = document.querySelector('.nav-burger');\n  if (!nav || !burger) return;\n  burger.addEventListener('click', function () {\n    var isOpen = nav.classList.toggle('open');\n    burger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');\n  });\n  nav.querySelectorAll('.nav-links a').forEach(function (sectionLink) {\n    sectionLink.addEventListener('click', closeMenu);\n  });\n  document.addEventListener('click', function (event) {\n    if (!nav.classList.contains('open')) return;\n    if (nav.contains(event.target)) return;\n    closeMenu();\n  });\n  document.addEventListener('keydown', function (event) {\n    if (event.key === 'Escape') closeMenu();\n  });\n  function closeMenu() {\n    nav.classList.remove('open');\n    burger.setAttribute('aria-expanded', 'false');\n  }\n})();\n<\/script>\n\n\n\n<\/body><\/html>"
